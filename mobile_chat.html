<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中越云端私人专线</title>
    <style>
        body { margin: 0; background: #ededed; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; }
        .bubble { background: #fff; padding: 10px; border-radius: 10px; margin-bottom: 10px; max-width: 80%; width: fit-content; word-break: break-all; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .img-chat { max-width: 100%; border-radius: 5px; margin-top: 5px; }
        .input-area { background: #f7f7f7; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input[type="text"] { flex: 1; border: none; padding: 10px; border-radius: 5px; outline: none; }
        button { background: #07c160; color: #fff; border: none; padding: 0 15px; border-radius: 5px; cursor: pointer; }
        .sys { text-align: center; font-size: 12px; color: #999; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="chat"><div class="sys">正在呼叫云端服务器...</div></div>
    <div class="input-area">
        <input type="file" id="f" style="display:none" onchange="upImg()">
        <button onclick="document.getElementById('f').click()" style="background:#888; color:white;">+</button>
        <input type="text" id="i" placeholder="输入消息...">
        <button onclick="send()">发送</button>
    </div>

    <script>
        // 自动为您配置了 Render 上的永久云端地址
        const ws = new WebSocket("wss://my-chat-server-n5er.onrender.com");
        const box = document.getElementById('chat');
        const user = "成员" + Math.floor(Math.random()*999);

        ws.onopen = () => box.innerHTML = `<div class="sys">✅ 云端专线已接通 (您的ID: ${user})</div>`;
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const content = d.type === 'text' ? d.content : `<img src="${d.content}" class="img-chat" onclick="window.open(this.src)">`;
            box.innerHTML += `<div class="msg"><small style="color:#888">${d.name}</small><div class="bubble">${content}</div></div>`;
            box.scrollTop = box.scrollHeight;
        };
        ws.onclose = () => box.innerHTML += `<div class="sys" style="color:red">❌ 与云端失去联系，正在重连...</div>`;

        function send() {
            const val = document.getElementById('i').value;
            if(val && ws.readyState === 1) {
                ws.send(JSON.stringify({type:'text', name:user, content:val}));
                document.getElementById('i').value = '';
            }
        }
        function upImg() {
            const file = document.getElementById('f').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                if(ws.readyState === 1) {
                    ws.send(JSON.stringify({type:'image', name:user, content:e.target.result}));
                }
            };
            if(file) reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
